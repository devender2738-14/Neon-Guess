<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Guess - Number Guesser</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="game-container glass-panel">
        <header>
            <h1>Neon Guess</h1>
            <p>Guess the number between <span class="highlight">1</span> and <span class="highlight">100</span>.</p>
        </header>

        <main>
            <div class="input-section">
                <input type="number" id="guess-input" placeholder="Enter your guess" min="1" max="100" autocomplete="off">
                <button id="guess-btn" class="btn primary-glow">Guess</button>
            </div>

            <div class="feedback-section glass-panel-inner">
                <h2 id="feedback-message">Awaiting your guess...</h2>
                <div class="stats">
                    <p>Attempts: <span id="attempt-count" class="highlight">0</span></p>
                    <p>Previous Guesses: <span id="previous-guesses">-</span></p>
                </div>
            </div>
            
            <button id="restart-btn" class="btn btn-outline hidden">Play Again</button>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
